<!doctype html>
<html>

<head>
    <meta charset="utf8">
    <title>Ejemplo de aplicacion Single Page</title>
    <style>
        .seccion{display: none;}
        .activa{display: block;}
    </style>
</head>


<body>

    <h1>Aplicación Gestor</h1>
    <div id="login" class="activa">
        <h2>Acceso</h2>
       <div>Usuario: <input id="usuario-login" /></div> 
       <div>Contraseña: <input id="contrasenya-login" type="password"/></div>
       <button onclick="entrar()">Entrar</button> 
       <button onclick="registrarse()">Registrarse</button>
    </div>
    <div id="menu-principal" class="seccion">
        <h2>Menu principal</h2>
        <button onclick="datosUsuario()"> Datos de usuario</button>
        <button onclick="salir()"> Salir </button>
    </div>
    <div id="datos-usuarios" class="seccion">
        <h2>Datos del usuario</h2>
        <div>Nombre: <input id="nombre-registro" /></div>
        <div>Apellidos: <input id="apellidos-registro"/></div>
        <div>Usuario: <input id="usuario-registro"/></div>
        <div>Contraseña: <input id="contrasenya-registro" type="password"/></div>
        <button onclick="registrarUsuario()">Registrarse</button>
        <button onclick="salir()"> Salir </button>
    </div>
        
<script src="rest.js"></script>
<script src="main.js"></script>
</body>
</html>
